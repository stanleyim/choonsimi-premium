name: Daily Macro Fetch

on:
  schedule:
    # 매일 08:30 KST = 23:30 UTC (전날)
    - cron: '30 23 * * 0-4'   # 일~목 23:30 UTC (= 월~금 08:30 KST)
  workflow_dispatch:
    inputs:
      backfill:
        description: 'Backfill 영업일 수 (선택)'
        required: false
        default: ''

jobs:
  fetch-macro:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch macro
        env:
          ECOS_KEY: ${{ secrets.ECOS_KEY }}
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: |
          if [ -n "${{ github.event.inputs.backfill }}" ]; then
            python fetch_macro.py --backfill ${{ github.event.inputs.backfill }}
          else
            python fetch_macro.py
          fi

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/macro.json
          if git diff --staged --quiet; then
            echo "변경 없음 — commit 생략"
          else
            git commit -m "chore(macro): daily update $(date -u +'%Y-%m-%d')"
            git push
          fi
