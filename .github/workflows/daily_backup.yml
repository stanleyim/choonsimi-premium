name: Daily Data Backup

# 매일 08:30 KST 자동 실행 (UTC 23:30 전날)
# + 수동 실행 가능
on:
  schedule:
    - cron: '30 23 * * 0-4'  # 일~목 23:30 UTC = 월~금 08:30 KST
  workflow_dispatch:
    inputs:
      backfill:
        description: '초기 수집 영업일 수 (예: 60). 비워두면 일일 증분 수집.'
        required: false
        default: ''
      date:
        description: '특정 날짜만 수집 (YYYYMMDD). 비워두면 일일 증분.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      TZ: Asia/Seoul
      KRX_ID: ${{ secrets.KRX_ID }}
      KRX_PW: ${{ secrets.KRX_PW }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify KRX credentials
        run: |
          if [ -z "$KRX_ID" ] || [ -z "$KRX_PW" ]; then
            echo "::warning::KRX_ID 또는 KRX_PW가 없습니다. 무인증 모드로 실행됩니다."
          else
            echo "✓ KRX credentials present"
          fi

      - name: Verify stocks_meta_extended.json exists
        run: |
          if [ ! -f data/stocks_meta_extended.json ]; then
            echo "::error::data/stocks_meta_extended.json이 없습니다. 먼저 'Select 200 Stocks' 워크플로를 실행하세요."
            exit 1
          fi
          echo "✓ stocks_meta_extended.json 존재"

      - name: Run daily backup
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.backfill }}" ]; then
            ARGS="--backfill ${{ github.event.inputs.backfill }}"
          elif [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="--date ${{ github.event.inputs.date }}"
          fi
          echo "Running: python fetch_data_extended.py $ARGS"
          python fetch_data_extended.py $ARGS

      - name: Commit results
        if: success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: daily backup $(date +%Y-%m-%d)"
            git push
          fi
