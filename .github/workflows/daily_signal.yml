name: Daily Signal

on:
  schedule:
    # 매일 08:50 KST = 23:50 UTC (전날)
    - cron: '50 23 * * 0-4'   # 일~목 23:50 UTC (= 월~금 08:50 KST)
  workflow_dispatch:
    inputs:
      backfill_data:
        description: 'fetch_data backfill 영업일 수 (선택, 초기 설치 시)'
        required: false
        default: ''

jobs:
  signal:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch data (OHLCV + flow + market_cap)
        run: |
          if [ -n "${{ github.event.inputs.backfill_data }}" ]; then
            python fetch_data.py --backfill ${{ github.event.inputs.backfill_data }}
          else
            python fetch_data.py
          fi

      - name: Fetch DART (재무 — 표시용, 점수 영향 X)
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        continue-on-error: true
        run: python fetch_dart.py

      - name: Run engine
        env:
          ECOS_KEY: ${{ secrets.ECOS_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python engine.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history.csv data/market_flow.json data/fundamental.json \
                  data/corp_map_cache.json data/signal_history.csv \
                  data/result.json data/forward_test.csv 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "변경 없음"
          else
            git commit -m "chore(signal): daily $(date -u +'%Y-%m-%d')"
            git push
          fi
